name: Build Conda Environment
run-name: Build ${{ github.event.inputs.platform }} conda env

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform for conda env"
        type: choice
        required: true
        default: "windows"
        options:
          - windows
          - linux
          - macos
      rust_toolchain:
        description: "Rust toolchain version"
        type: string
        required: false
        default: "stable"
      build_profile:
        description: "Cargo build profile"
        type: choice
        required: false
        default: "release"
        options:
          - release
          - debug
      retention_days:
        description: "Days to keep the artifacts"
        type: int
        required: false
        default: 30
      create_release:
        description: "Create GitHub release (tag required)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  build_conda_env:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            target_folder: "conda_envs"
            env_name: "claw-env"
            bin_name: "claw.exe"
          - platform: linux
            os: ubuntu-latest
            target_folder: "conda_envs"
            env_name: "claw-env"
            bin_name: "claw"
          - platform: macos
            os: macos-14
            target_folder: "conda_envs"
            env_name: "claw-env"
            bin_name: "claw"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          BUILD_NUMBER="$(git rev-list --count HEAD)"
          SHORT_HASH="$(git rev-parse --short=7 HEAD)"
          
          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            echo "name=claw-env-${{ github.event.inputs.platform }}-b${BUILD_NUMBER}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            SAFE_NAME=$(echo "${GITHUB_REF#refs/heads/}" | tr '/' '-')
            echo "name=claw-env-${{ github.event.inputs.platform }}-b${BUILD_NUMBER}-${SHORT_HASH}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: ${{ github.event.inputs.create_release == 'true' }}
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          release_name: ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: false

      - name: Setup Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          auto-activate-base: false
          use-mamba: true
          mamba-version: latest

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust -> target

      - name: Create Conda Environment
        shell: bash
        run: |
          TARGET_PATH="${GITHUB_WORKSPACE}/${{ matrix.target_folder }}"
          mkdir -p "$TARGET_PATH"
          
          ENV_PATH="$TARGET_PATH/${{ matrix.env_name }}"
          if [ -d "$ENV_PATH" ]; then
            echo "Updating existing environment..."
            conda env update -f environment.yml -p "$ENV_PATH"
          else
            echo "Creating new environment..."
            conda env create -f environment.yml -p "$ENV_PATH"
          fi
          
          echo "TARGET_PATH=$TARGET_PATH" >> $GITHUB_ENV

      - name: Build Rust project
        shell: bash
        run: |
          cd rust
          cargo build --${{ github.event.inputs.build_profile }} -p rusty-claude-cli

      - name: Install binary into Conda environment
        shell: bash
        run: |
          BIN_PATH="rust/target/${{ github.event.inputs.build_profile }}/${{ matrix.bin_name }}"
          ENV_BIN_DIR="${TARGET_PATH}/${{ matrix.env_name }}/bin"
          
          echo "Copying $BIN_PATH to $ENV_BIN_DIR"
          cp "$BIN_PATH" "$ENV_BIN_DIR/${{ matrix.bin_name }}"
          
          if [[ "${{ matrix.os }}" != "windows-latest" ]]; then
            chmod +x "$ENV_BIN_DIR/${{ matrix.bin_name }}"
          fi

      - name: Verify installation
        shell: bash
        run: |
          source $CONDA/etc/profile.d/conda.sh
          conda activate "${TARGET_PATH}/${{ matrix.env_name }}"
          
          echo "Checking claw..."
          which claw
          
          echo "Environment contents:"
          conda list

      - name: Export environment specification
        shell: bash
        run: |
          source $CONDA/etc/profile.d/conda.sh
          conda activate "${TARGET_PATH}/${{ matrix.env_name }}"
          
          mkdir -p zipped
          
          # Export environment.yml
          conda env export --no-builds -f zipped/environment.yml
          
          # Create README.md
          cat > zipped/README.md << 'EOF'
# Claw Conda Environment

This is a pre-built conda environment containing the Claw CLI tool.

## Installation

1. Download all `.7z` parts and ensure they are in the same directory
2. Extract using: `7z x claw-env-{platform}-{version}.7z.001`
3. Activate the environment:
   ```bash
   source $CONDA/etc/profile.d/conda.sh
   conda activate ./claw-env
   ```
4. Run `claw --help` to verify installation

## Usage

```bash
claw --help
claw run "your task here"
```

## Environment Details

- Python: 3.11
- Platform: ${{ github.event.inputs.platform }}
- Built from commit: ${{ github.sha }}
EOF          


      - name: Setup 7-Zip
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            sudo apt-get update && sudo apt-get install -y p7zip-full
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            brew install p7zip || true
          else
            # Windows - use choco or winget
            if [[ -f "/c/Program Files/7-Zip/7z.exe" ]]; then
              echo "7-Zip already installed"
            elif command -v choco &> /dev/null; then
              choco install 7zip -y
            else
              winget install --id 7zip.7zip -e --source winget
            fi
          fi

      - name: Compress environment
        shell: bash
        run: |
          ENV_ARCHIVE="zipped/claw-env-${{ github.event.inputs.platform }}-${{ steps.tag.outputs.name }}"
          ENV_DIR="${TARGET_PATH}/${{ matrix.env_name }}"
          
          echo "Compressing $ENV_DIR to ${ENV_ARCHIVE}.7z"
          
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            "C:/Program Files/7-Zip/7z.exe" a -t7z -v800m "${ENV_ARCHIVE}.7z.001" "$ENV_DIR"/
          else
            7z a -t7z -v800m "${ENV_ARCHIVE}.7z.001" "$ENV_DIR"/
          fi
          
          ls -la zipped/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claw-env-${{ github.event.inputs.platform }}-${{ steps.tag.outputs.name }}
          path: |
            zipped/*.7z.*
            zipped/environment.yml
            zipped/README.md
          retention-days: ${{ github.event.inputs.retention_days }}

      - name: Upload to Release
        if: ${{ github.event.inputs.create_release == 'true' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const releaseId = '${{ steps.create_release.outputs.id }}';
            
            let body = '';
            try {
              body = fs.readFileSync('zipped/README.md', 'utf8');
            } catch (err) {
              console.log('No README found');
            }
            
            await github.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              body: body
            });
            
            const files = fs.readdirSync('zipped').filter(f => f.startsWith('claw-env'));
            for (const file of files) {
              console.log(`Uploading ${file}`);
              await github.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                name: file,
                data: fs.readFileSync(`zipped/${file}`)
              });
            }
